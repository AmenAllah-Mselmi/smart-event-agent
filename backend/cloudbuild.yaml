steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/smart-event-backend:latest'
      - '-t'
      - 'gcr.io/$PROJECT_ID/smart-event-backend:$SHORT_SHA'
      - '.'

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/smart-event-backend:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/smart-event-backend:$SHORT_SHA
      - --location=us-central1
      - --namespace=default

images:
  - 'gcr.io/$PROJECT_ID/smart-event-backend:latest'
  - 'gcr.io/$PROJECT_ID/smart-event-backend:$SHORT_SHA'

timeout: '1200s'
options:
  machineType: 'N1_HIGHCPU_8'
